<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de vendas</title>

    <link rel="stylesheet" href="/sales_analysis/static/css/dashboard.css">
</head>

<body>
    <header>
        <nav>
            <h1>Dashboard de vendas</h1>
        </nav>
    </header>
    <main>
        <section>
            <h2>Visão geral das vendas</h2>
            <p>Total de vendas: {{ total_vendas }}</p>
            <p>Vendas por categoria:</p>
            <ul>
                {% for categoria, vendas in vendas_por_categoria.items() %}
                <li>{{ categoria }}: {{ vendas }}</li>
                {% endfor %}
            </ul>
        </section>
        <section>
            <h2>Gráfico de vendas por produto</h2>
            <canvas id="salesChart"></canvas>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/sales_analysis/static/js/dashboard.js"></script>
</body>
</html>
